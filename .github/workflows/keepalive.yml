name: Keepalive

# GitHub disables scheduled workflows after 60 days of repo inactivity. This
# makes a tiny monthly commit so the data-update workflow is never auto-paused.
on:
  schedule:
    - cron: "0 7 1 * *"   # 07:00 UTC on the 1st of each month
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Touch keepalive timestamp
        run: |
          mkdir -p .github
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/keepalive
          if [[ -n "$(git status --porcelain .github/keepalive)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/keepalive
            git commit -m "chore: keepalive"
            git push
          fi
